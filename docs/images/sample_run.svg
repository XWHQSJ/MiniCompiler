<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" font-family="'SF Mono','Cascadia Code','Fira Code',monospace">
  <defs>
    <linearGradient id="tb" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c1c1e"/>
      <stop offset="100%" stop-color="#151517"/>
    </linearGradient>
  </defs>

  <!-- Terminal window -->
  <rect width="720" height="520" rx="10" fill="url(#tb)"/>

  <!-- Title bar -->
  <rect width="720" height="36" rx="10" fill="#2c2c2e"/>
  <rect y="26" width="720" height="10" fill="#2c2c2e"/>
  <!-- Traffic lights -->
  <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="18" r="6" fill="#febc2e"/>
  <circle cx="60" cy="18" r="6" fill="#28c840"/>
  <text x="360" y="22" text-anchor="middle" fill="#98989d" font-size="12" font-family="'Segoe UI',system-ui,sans-serif">minicc &mdash; Terminal</text>

  <!-- Example 1: Sieve -->
  <text x="24" y="68" fill="#5ac8fa" font-size="13" font-weight="600"># Sieve of Eratosthenes &mdash; primes up to 20</text>

  <text x="24" y="92" fill="#a9a9ad" font-size="13">$</text>
  <text x="38" y="92" fill="#fefefe" font-size="13">echo "20" | ./build/minicc examples/sieve.pas --run</text>

  <text x="24" y="114" fill="#30d158" font-size="13">2</text>
  <text x="24" y="131" fill="#30d158" font-size="13">3</text>
  <text x="24" y="148" fill="#30d158" font-size="13">5</text>
  <text x="24" y="165" fill="#30d158" font-size="13">7</text>
  <text x="24" y="182" fill="#30d158" font-size="13">11</text>
  <text x="24" y="199" fill="#30d158" font-size="13">13</text>
  <text x="24" y="216" fill="#30d158" font-size="13">17</text>
  <text x="24" y="233" fill="#30d158" font-size="13">19</text>

  <!-- Divider -->
  <line x1="24" y1="250" x2="696" y2="250" stroke="#3a3a3c" stroke-width="1"/>

  <!-- Example 2: Factorial -->
  <text x="24" y="274" fill="#5ac8fa" font-size="13" font-weight="600"># Recursive factorial &mdash; 5!</text>

  <text x="24" y="298" fill="#a9a9ad" font-size="13">$</text>
  <text x="38" y="298" fill="#fefefe" font-size="13">echo "5" | ./build/minicc examples/factorial.pas --run</text>

  <text x="24" y="320" fill="#30d158" font-size="13">120</text>

  <!-- Divider -->
  <line x1="24" y1="340" x2="696" y2="340" stroke="#3a3a3c" stroke-width="1"/>

  <!-- Example 3: Sort -->
  <text x="24" y="364" fill="#5ac8fa" font-size="13" font-weight="600"># Bubble sort 3 integers</text>

  <text x="24" y="388" fill="#a9a9ad" font-size="13">$</text>
  <text x="38" y="388" fill="#fefefe" font-size="13">printf "3\n1\n2\n" | ./build/minicc examples/sort.pas --run</text>

  <text x="24" y="410" fill="#30d158" font-size="13">1</text>
  <text x="24" y="427" fill="#30d158" font-size="13">2</text>
  <text x="24" y="444" fill="#30d158" font-size="13">3</text>

  <!-- Divider -->
  <line x1="24" y1="461" x2="696" y2="461" stroke="#3a3a3c" stroke-width="1"/>

  <!-- Example 4: Power -->
  <text x="24" y="485" fill="#5ac8fa" font-size="13" font-weight="600"># Compute 2^10</text>

  <text x="24" y="507" fill="#a9a9ad" font-size="13">$</text>
  <text x="38" y="507" fill="#fefefe" font-size="13">echo "2 10" | ./build/minicc examples/power.pas --run</text>

  <!-- Cursor block -->
  <rect x="698" y="496" width="8" height="16" fill="#fefefe" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0;0.7" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>