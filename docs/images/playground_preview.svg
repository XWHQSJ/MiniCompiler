  <!-- "WASM preview" watermark -->
  <rect x="520" y="260" width="310" height="100" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="675" y="296" text-anchor="middle" fill="#484f58" font-size="13" font-weight="600">Playground Preview</text>
  <text x="675" y="316" text-anchor="middle" fill="#484f58" font-size="10">Build WASM to enable live execution:</text>
  <text x="675" y="336" text-anchor="middle" fill="#58a6ff" font-size="10" font-family="'SF Mono',monospace">emcmake cmake -B build-web</text>
  <text x="675" y="350" text-anchor="middle" fill="#58a6ff" font-size="10" font-family="'SF Mono',monospace">emmake make -C build-web minicc</text>
</svg>