  <rect x="456" y="100" width="90" height="12" fill="#161b22"/>
  <text x="468" y="103" fill="#c9d1d9" font-size="10">Output</text>

  <!-- Input label -->
  <rect x="556" y="84" width="70" height="28" rx="6" fill="#0d1117"/>
  <text x="568" y="103" fill="#484f58" font-size="10">Input</text>

  <!-- Output content -->
  <text x="468" y="134" fill="#8b949e" font-size="11" font-family="'SF Mono','Cascadia Code',monospace">stdin: 5</text>

  <line x1="468" y1="146" x2="876" y2="146" stroke="#21262d" stroke-width="1"/>

  <text x="468" y="168" fill="#3fb950" font-size="13" font-family="'SF Mono','Cascadia Code',monospace" font-weight="600">120</text>

  <!-- Status bar -->
  <rect x="456" y="468" width="432" height="28" rx="0" fill="#161b22"/>
  <circle cx="472" cy="482" r="4" fill="#3fb950"/>
  <text x="484" y="486" fill="#8b949e" font-size="10">Compiled &amp; executed in 2ms</text>
  <text x="820" y="486" fill="#484f58" font-size="10">VM: 24 quads</text>

  <!-- Splitter -->
