<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" font-family="'Segoe UI',system-ui,-apple-system,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" viewBox="0 0 10 8" refX="9" refY="4" markerWidth="8" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 4 L 0 8 z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="520" rx="12" fill="url(#bg)"/>

  <!-- Title -->
  <text x="480" y="38" text-anchor="middle" fill="#f8fafc" font-size="18" font-weight="600" letter-spacing="0.5">MiniCompiler Pipeline</text>

  <!-- Stage boxes -->
  <!-- 1: Source -->
  <rect x="22" y="62" width="120" height="54" rx="8" fill="#1e3a5f" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="82" y="85" text-anchor="middle" fill="#7dd3fc" font-size="11" font-weight="600">SOURCE</text>
  <text x="82" y="103" text-anchor="middle" fill="#94a3b8" font-size="10">.pas file</text>

  <!-- Arrow 1->2 -->
  <line x1="142" y1="89" x2="168" y2="89" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 2: Lexer -->
  <rect x="170" y="62" width="120" height="54" rx="8" fill="#312e81" stroke="#818cf8" stroke-width="1.5"/>
  <text x="230" y="85" text-anchor="middle" fill="#a5b4fc" font-size="11" font-weight="600">LEXER</text>
  <text x="230" y="103" text-anchor="middle" fill="#94a3b8" font-size="10">lex_pascal</text>

  <!-- Arrow 2->3 -->
  <line x1="290" y1="89" x2="316" y2="89" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 3: Parser -->
  <rect x="318" y="62" width="120" height="54" rx="8" fill="#4c1d95" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="378" y="85" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="600">PARSER</text>
  <text x="378" y="103" text-anchor="middle" fill="#94a3b8" font-size="10">recursive descent</text>

  <!-- Arrow 3->4 -->
  <line x1="438" y1="89" x2="464" y2="89" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 4: Semantic -->
  <rect x="466" y="62" width="120" height="54" rx="8" fill="#701a75" stroke="#e879f9" stroke-width="1.5"/>
  <text x="526" y="85" text-anchor="middle" fill="#f0abfc" font-size="11" font-weight="600">SEMANTIC</text>
  <text x="526" y="103" text-anchor="middle" fill="#94a3b8" font-size="10">type check</text>

  <!-- Arrow 4->5 -->
  <line x1="586" y1="89" x2="612" y2="89" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 5: IR -->
  <rect x="614" y="62" width="120" height="54" rx="8" fill="#7c2d12" stroke="#fb923c" stroke-width="1.5"/>
  <text x="674" y="85" text-anchor="middle" fill="#fdba74" font-size="11" font-weight="600">IR GEN</text>
  <text x="674" y="103" text-anchor="middle" fill="#94a3b8" font-size="10">three-address</text>

  <!-- Arrow 5->6 -->
  <line x1="734" y1="89" x2="760" y2="89" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 6: VM -->
  <rect x="762" y="62" width="120" height="54" rx="8" fill="#14532d" stroke="#4ade80" stroke-width="1.5"/>
  <text x="822" y="85" text-anchor="middle" fill="#86efac" font-size="11" font-weight="600">VM</text>
  <text x="822" y="103" text-anchor="middle" fill="#94a3b8" font-size="10">stack-based</text>

  <!-- Output boxes below each stage -->
  <!-- Source snippet -->
  <rect x="22" y="136" width="120" height="80" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="30" y="154" fill="#38bdf8" font-size="9" font-family="'SF Mono','Cascadia Code',monospace">begin</text>
  <text x="30" y="167" fill="#94a3b8" font-size="9" font-family="'SF Mono','Cascadia Code',monospace">  integer m;</text>
  <text x="30" y="180" fill="#94a3b8" font-size="9" font-family="'SF Mono','Cascadia Code',monospace">  read(m);</text>
  <text x="30" y="193" fill="#94a3b8" font-size="9" font-family="'SF Mono','Cascadia Code',monospace">  k:=f(m);</text>
  <text x="30" y="206" fill="#38bdf8" font-size="9" font-family="'SF Mono','Cascadia Code',monospace">end</text>

  <!-- Token snippet -->
  <rect x="170" y="136" width="120" height="80" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="178" y="154" fill="#818cf8" font-size="9" font-family="'SF Mono','Cascadia Code',monospace">BEGIN</text>
  <text x="178" y="167" fill="#94a3b8" font-size="9" font-family="'SF Mono','Cascadia Code',monospace">INTEGER  ID:m</text>
  <text x="178" y="180" fill="#94a3b8" font-size="9" font-family="'SF Mono','Cascadia Code',monospace">READ LPAREN</text>
  <text x="178" y="193" fill="#94a3b8" font-size="9" font-family="'SF Mono','Cascadia Code',monospace">ID:m RPAREN</text>
  <text x="178" y="206" fill="#818cf8" font-size="9" font-family="'SF Mono','Cascadia Code',monospace">END  EOF</text>

  <!-- AST snippet -->
  <rect x="318" y="136" width="120" height="80" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="326" y="154" fill="#a78bfa" font-size="9" font-family="'SF Mono','Cascadia Code',monospace">Program</text>
  <text x="326" y="167" fill="#94a3b8" font-size="9" font-family="'SF Mono','Cascadia Code',monospace"> DeclList</text>
  <text x="326" y="180" fill="#94a3b8" font-size="9" font-family="'SF Mono','Cascadia Code',monospace">  VarDecl:m</text>
  <text x="326" y="193" fill="#94a3b8" font-size="9" font-family="'SF Mono','Cascadia Code',monospace">  FuncDef:f</text>
  <text x="326" y="206" fill="#a78bfa" font-size="9" font-family="'SF Mono','Cascadia Code',monospace"> StmtList</text>

  <!-- Semantic snippet -->
  <rect x="466" y="136" width="120" height="80" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="474" y="154" fill="#e879f9" font-size="9" font-family="'SF Mono','Cascadia Code',monospace">scope: global</text>
  <text x="474" y="167" fill="#94a3b8" font-size="9" font-family="'SF Mono','Cascadia Code',monospace"> m : integer</text>
  <text x="474" y="180" fill="#94a3b8" font-size="9" font-family="'SF Mono','Cascadia Code',monospace"> k : integer</text>
  <text x="474" y="193" fill="#94a3b8" font-size="9" font-family="'SF Mono','Cascadia Code',monospace"> f : func(int)</text>
  <text x="474" y="206" fill="#e879f9" font-size="9" font-family="'SF Mono','Cascadia Code',monospace">types OK</text>

  <!-- IR snippet -->
  <rect x="614" y="136" width="120" height="80" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="622" y="154" fill="#fb923c" font-size="9" font-family="'SF Mono','Cascadia Code',monospace">READ  m</text>
  <text x="622" y="167" fill="#94a3b8" font-size="9" font-family="'SF Mono','Cascadia Code',monospace">PARAM m</text>
  <text x="622" y="180" fill="#94a3b8" font-size="9" font-family="'SF Mono','Cascadia Code',monospace">CALL t7 f 1</text>
  <text x="622" y="193" fill="#94a3b8" font-size="9" font-family="'SF Mono','Cascadia Code',monospace">ASSIGN k t7</text>
  <text x="622" y="206" fill="#fb923c" font-size="9" font-family="'SF Mono','Cascadia Code',monospace">WRITE k</text>

  <!-- VM snippet -->
  <rect x="762" y="136" width="120" height="80" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="770" y="154" fill="#4ade80" font-size="9" font-family="'SF Mono','Cascadia Code',monospace">stack:</text>
  <text x="770" y="167" fill="#94a3b8" font-size="9" font-family="'SF Mono','Cascadia Code',monospace"> push 5</text>
  <text x="770" y="180" fill="#94a3b8" font-size="9" font-family="'SF Mono','Cascadia Code',monospace"> call f</text>
  <text x="770" y="193" fill="#94a3b8" font-size="9" font-family="'SF Mono','Cascadia Code',monospace"> => 120</text>
  <text x="770" y="206" fill="#4ade80" font-size="9" font-family="'SF Mono','Cascadia Code',monospace">stdout: 120</text>

  <!-- Bottom: data flow labels -->
  <rect x="22" y="240" width="916" height="1" fill="#334155"/>

  <!-- Detail row: source files -> modules -->
  <text x="480" y="270" text-anchor="middle" fill="#64748b" font-size="11" font-style="italic">Source files in src/</text>

  <!-- Module boxes row -->
  <rect x="32" y="290" width="130" height="40" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="97" y="314" text-anchor="middle" fill="#cbd5e1" font-size="10">lexer_pascal/</text>

  <rect x="182" y="290" width="130" height="40" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="247" y="314" text-anchor="middle" fill="#cbd5e1" font-size="10">parser/</text>

  <rect x="332" y="290" width="130" height="40" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="397" y="314" text-anchor="middle" fill="#cbd5e1" font-size="10">ast/</text>

  <rect x="482" y="290" width="130" height="40" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="547" y="314" text-anchor="middle" fill="#cbd5e1" font-size="10">ir/ + symtable/</text>

  <rect x="632" y="290" width="130" height="40" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="697" y="314" text-anchor="middle" fill="#cbd5e1" font-size="10">vm/</text>

  <rect x="782" y="290" width="130" height="40" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="847" y="314" text-anchor="middle" fill="#cbd5e1" font-size="10">driver/</text>

  <!-- Bottom info -->
  <text x="480" y="365" text-anchor="middle" fill="#475569" font-size="10">44 tests &middot; C++17 &middot; CMake &middot; GoogleTest &middot; libFuzzer</text>

  <!-- Stage count labels -->
  <text x="82" y="385" text-anchor="middle" fill="#334155" font-size="28" font-weight="700" opacity="0.4">1</text>
  <text x="230" y="385" text-anchor="middle" fill="#334155" font-size="28" font-weight="700" opacity="0.4">2</text>
  <text x="378" y="385" text-anchor="middle" fill="#334155" font-size="28" font-weight="700" opacity="0.4">3</text>
  <text x="526" y="385" text-anchor="middle" fill="#334155" font-size="28" font-weight="700" opacity="0.4">4</text>
  <text x="674" y="385" text-anchor="middle" fill="#334155" font-size="28" font-weight="700" opacity="0.4">5</text>
  <text x="822" y="385" text-anchor="middle" fill="#334155" font-size="28" font-weight="700" opacity="0.4">6</text>

  <!-- Stage labels bottom -->
  <text x="82" y="404" text-anchor="middle" fill="#475569" font-size="9">Tokenize</text>
  <text x="230" y="404" text-anchor="middle" fill="#475569" font-size="9">Scan</text>
  <text x="378" y="404" text-anchor="middle" fill="#475569" font-size="9">Parse</text>
  <text x="526" y="404" text-anchor="middle" fill="#475569" font-size="9">Validate</text>
  <text x="674" y="404" text-anchor="middle" fill="#475569" font-size="9">Lower</text>
  <text x="822" y="404" text-anchor="middle" fill="#475569" font-size="9">Execute</text>

  <!-- Connecting line across bottom -->
  <line x1="82" y1="415" x2="822" y2="415" stroke="#334155" stroke-width="1" stroke-dasharray="4,4"/>
  <circle cx="82" cy="415" r="3" fill="#38bdf8"/>
  <circle cx="230" cy="415" r="3" fill="#818cf8"/>
  <circle cx="378" cy="415" r="3" fill="#a78bfa"/>
  <circle cx="526" cy="415" r="3" fill="#e879f9"/>
  <circle cx="674" cy="415" r="3" fill="#fb923c"/>
  <circle cx="822" cy="415" r="3" fill="#4ade80"/>

  <!-- Footer -->
  <text x="480" y="500" text-anchor="middle" fill="#334155" font-size="9">MiniCompiler &mdash; github.com/XWHQSJ/MiniCompiler</text>
</svg>